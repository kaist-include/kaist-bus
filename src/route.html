<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#f2f9ee" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#05070f" media="(prefers-color-scheme: dark)" />
    <title>KAIST BUS 2.0 · 시간표</title>
    <link rel="icon" type="image/png" href="/logo-60.png" />
    <link rel="apple-touch-icon" href="/logo-192.png" />
    <link rel="stylesheet" href="./styles.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.css" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@600;700&display=swap" />
  </head>
  <body class="route-page">
    <div class="page">
      <header class="navbar">
        <div class="brand">
          <img src="/logo-60.png" alt="KAIST BUS 2.0" />
          <div>
            <strong>KAIST BUS 2.0</strong>
            <div class="muted">
              <span data-date>----</span>
              <span data-weekday>----</span>
              <span data-clock>--:--:--</span>
            </div>
          </div>
        </div>
        <nav class="primary-nav">
          <div class="nav-links">
            <a href="./index.html" data-i18n="navMain">메인</a>
            <a href="./route.html" data-i18n="navTimetable">시간표</a>
          </div>
          <div class="nav-actions">
            <button class="favorite-tab" type="button" data-favorite-tab data-i18n="navFavorite">즐겨찾기</button>
            <button class="locale-toggle" type="button" data-locale-toggle aria-label="언어 변경">KO</button>
            <button class="theme-toggle" type="button" data-theme-toggle aria-label="다크모드 전환">
              <svg class="icon-sun" viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="12" cy="12" r="4"></circle>
                <path d="M12 2v3M12 19v3M4 12H1M23 12h-3M5.2 5.2 7.3 7.3M16.7 16.7l2.1 2.1M18.8 5.2 16.7 7.3M7.3 16.7 5.2 18.8"></path>
              </svg>
              <svg class="icon-moon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M21 14.5A8.5 8.5 0 0 1 9.5 3a7 7 0 1 0 11.5 11.5z"></path>
              </svg>
            </button>
          </div>
        </nav>
      </header>

      <div class="favorite-dock" id="favoriteDock">
        <div class="favorite-dock__handle">즐겨찾기</div>
        <div class="favorite-dock__panel" id="favoriteDockPanel">
          <div class="favorite-dock__empty">
            즐겨찾기가 비어 있어요. 상단의 "즐겨찾기 추가" 버튼으로 등록해 주세요.
          </div>
        </div>
      </div>

      <main>
        <section>
          <div class="notice-ticker" id="noticeTicker" aria-live="polite"></div>
        </section>

        <section class="route-layout">
          <div class="route-side">
            <div class="hero-card route-info-card">
              <div class="route-title-row">
                <h1 data-route-title>시간표</h1>
                <span class="hero-badge" data-route-badge></span>
              </div>
              <p data-route-subtitle></p>
              <p class="share-note" id="shareNotice" aria-live="polite"></p>
              <div class="day-toggle" id="serviceDayToggle">
                <div class="day-toggle__segment" role="group" aria-label="운행일 선택">
                  <button type="button" data-day="weekday">평일</button>
                  <button type="button" data-day="weekend">휴일</button>
                </div>
                <button type="button" class="day-toggle__auto" data-day="auto">오늘 기준</button>
              </div>
              <div class="selector" style="margin-top:16px;">
                <div class="selector-row">
                  <label for="routeSelect" data-i18n="routeLabel">노선</label>
                  <select id="routeSelect"></select>
                </div>
                <div class="selector-row" id="stopSelectRow">
                  <label for="stopSelect" id="stopSelectLabel" data-i18n="stopLabel">정류장</label>
                  <select id="stopSelect"></select>
                </div>
              </div>
              <div class="campus-selector" id="campusSelector">
                <div class="campus-label-column">
                  <span class="campus-label" data-i18n="departLabel">출발</span>
                  <span class="campus-label" data-i18n="arriveLabel">도착</span>
                </div>
                <div class="campus-pills-column">
                  <div class="campus-pills-row" data-campus-role="from"></div>
                  <button class="swap-button" id="campusSwap" type="button" aria-label="출발/도착 바꾸기" data-i18n-aria-label="swapCampus">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                      <path d="M12 4v16m0 0-4-4m4 4 4-4M12 4l-4 4m4-4 4 4" />
                    </svg>
                  </button>
                  <div class="campus-pills-row" data-campus-role="to"></div>
                </div>
              </div>
              <div class="action-row">
                <div class="favorite-help-row">
                  <button class="action-button" id="favoriteToggleRoute">즐겨찾기 추가</button>
                  <span class="favorite-help" id="favoriteHelp" aria-hidden="true"></span>
                </div>
                <button class="action-button action-button--ghost" id="shareLink" type="button">링크 공유</button>
              </div>
            </div>

            <div class="hero-card info-card" id="nextPanel"></div>
            <div class="hero-card info-card" id="routeNote" style="margin-top:0;"></div>
          </div>
          <div class="route-main" id="timeTableSection">
            <div class="section-title section-title--right">전체 시간표</div>
            <div class="time-table" id="timeTable"></div>
          </div>
        </section>
      </main>

      <footer class="footer">
        <span data-i18n="footerRoute">KAIST BUS 2.0 · 실시간 위치 제공 없음 · 시간표는 예고 없이 변경될 수 있습니다.</span>
        <span class="footer-update" id="footerUpdateRoute">(2026년 3월 1일 업데이트)</span>
      </footer>
    </div>

    <script type="module" src="./route.js"></script>
  </body>
</html>
