<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KAIST 버스 2.0 - 개인정보 정책</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.css" />
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: "Pretendard Variable", sans-serif; background: #f5f6fc; color: #1b1e2d; min-height: 100vh; padding: 2rem 1rem; }
    .wrap { max-width: 560px; margin: 0 auto; }
    h1 { font-size: 1.35rem; margin-bottom: 1.5rem; }
    .card { background: #fff; border-radius: 20px; padding: 1.5rem; box-shadow: 0 18px 40px rgba(24,19,54,0.14); }
    p { margin: 0 0 1rem; line-height: 1.6; }
    p:last-child { margin-bottom: 0; }
    .muted { color: #636f7e; font-size: 0.95rem; }
    a { color: #2f9188; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>개인정보 정책</h1>
    <div class="card">
      <p>카이스트 버스 2.0은 어떠한 개인정보도 수집하거나 보관하지 않습니다.</p>
      <p class="muted">KAIST BUS 2.0 does not gather nor store any personal information.</p>
      <p><a href="./index.html">메인으로 돌아가기</a></p>
    </div>
  </div>
</body>
</html>
